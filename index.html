<div class="chat-container" id="chatContainer">
    <div class="status-message" data-en="Start chatting! 🚀" data-ar="ابدأ الدردشة! 🚀">Start chatting! 🚀</div>
</div>

<div class="input-container">
    <input type="text" class="message-input" id="messageInput" placeholder="Type a message..." data-placeholder-en="Type a message..." data-placeholder-ar="اكتب رسالة..." onkeypress="handleKeyPress(event)">
    <button class="send-button" onclick="sendMessage()" title="Send message" data-title-en="Send message" data-title-ar="إرسال رسالة"></button>
</div>

<script>
    let currentLang = 'en';
    let currentMode = 'dark';
    let userName = '';

    // Language translations
    const translations = {
        en: {
            'ChatX': 'ChatX',
            'Name:': 'Name:',
            'Enter your name': 'Enter your name',
            'العربية': 'العربية',
            'English': 'English',
            '🌙 Dark': '🌙 Dark',
            '☀️ Light': '☀️ Light',
            'Start chatting! 🚀': 'Start chatting! 🚀',
            'Type a message...': 'Type a message...',
            'Send message': 'Send message'
        },
        ar: {
            'ChatX': 'ChatX',
            'Name:': 'الاسم:',
            'Enter your name': 'أدخل اسمك',
            'العربية': 'English',
            'English': 'العربية',
            '🌙 Dark': '☀️ Light',
            '☀️ Light': '🌙 Dark',
            'Start chatting! 🚀': 'ابدأ الدردشة! 🚀',
            'Type a message...': 'اكتب رسالة...',
            'Send message': 'إرسال رسالة'
        }
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        updateLanguage();
        updateMode();
        
        // Set user name from input
        document.getElementById('userName').addEventListener('input', function(e) {
            userName = e.target.value || 'Anonymous';
        });
    });

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        document.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateLanguage();
    }

    function toggleMode() {
        currentMode = currentMode === 'dark' ? 'light' : 'dark';
        updateMode();
    }

    function updateLanguage() {
        document.documentElement.lang = currentLang;
        
        // Update all translatable elements
        document.querySelectorAll('[data-en]').forEach(element => {
            const key = element.getAttribute(`data-${currentLang}`);
            if (key) {
                element.textContent = key;
            }
        });
        
        // Update placeholders
        document.querySelectorAll('[data-placeholder-en]').forEach(element => {
            const placeholder = element.getAttribute(`data-placeholder-${currentLang}`);
            if (placeholder) {
                element.placeholder = placeholder;
            }
        });
        
        // Update titles
        document.querySelectorAll('[data-title-en]').forEach(element => {
            const title = element.getAttribute(`data-title-${currentLang}`);
            if (title) {
                element.title = title;
            }
        });
    }

    function updateMode() {
        if (currentMode === 'light') {
            document.body.classList.add('light-mode');
        } else {
            document.body.classList.remove('light-mode');
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        
        if (message) {
            addMessage(message, true);
            input.value = '';
            
            // Simulate response after 1 second
            setTimeout(() => {
                const responses = [
                    "Great message! 💬",
                    "I understand what you mean. 🤔",
                    "Thanks for sharing! 👍",
                    "Interesting point! 🌟",
                    "I agree with you. ✅"
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addMessage(randomResponse, false);
            }, 1000);
        }
    }

    function addMessage(text, isSent) {
        const chatContainer = document.getElementById('chatContainer');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
        
        const time = new Date().toLocaleTimeString(currentLang === 'ar' ? 'ar-SA' : 'en-US', {
            hour: '2-digit',
            minute: '2-digit'
        });
        
        const senderName = isSent ? (userName || 'You') : 'ChatX';
        const senderNameAr = isSent ? (userName || 'أنت') : 'ChatX';
        
        messageDiv.innerHTML = `
            <div>$${text}</div>
            <div class="message-time">
                $${currentLang === 'en' ? senderName : senderNameAr} • ${time}
            </div>
        `;
        
        // Remove status message if it exists
        const statusMessage = chatContainer.querySelector('.status-message');
        if (statusMessage) {
            statusMessage.remove();
        }
        
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>
