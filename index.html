<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatX</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#075e54">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg-primary:#ece5dd;
--bg-header:#075e54;
--chat-user:#dcf8c5;
--chat-bot:#fff;
--text:#111;
}

/* أوضاع الخلفية */
.bg-white{ --bg-primary:#ffffff; }
.bg-dark{ --bg-primary:#0a1014; }
.bg-gray{ --bg-primary:#2a2a2a; }
.bg-gold{ --bg-primary:#1f1a0d; }

body.dark{
--bg-header:#202c33;
--chat-user:#005c4b;
--chat-bot:#202c33;
--text:#fff;
}

body{
font-family:system-ui;
background:var(--bg-primary);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:var(--bg-header);
color:#fff;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px;
border-radius:12px;
}

.me{align-self:flex-end;background:var(--chat-user);}
.other{align-self:flex-start;background:var(--chat-bot);}

.time{
font-size:10px;
opacity:.6;
margin-top:5px;
}

/* day label */
.day{
text-align:center;
font-size:12px;
opacity:.7;
margin:10px 0;
}

/* input */
.inputArea{
display:flex;
padding:10px;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.send{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:#25D366;
color:#fff;
font-size:18px;
}

/* settings */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000000aa;
display:none;
justify-content:center;
align-items:center;
}

.modalBox{
background:white;
padding:20px;
border-radius:15px;
width:80%;
max-width:300px;
}

.modalBox button,select{
width:100%;
margin-top:10px;
padding:10px;
}
</style>
</head>

<body>

<div class="header">
💬 ChatX
<button onclick="openSettings()">⚙️</button>
</div>

<div id="chat" class="messages"></div>

<div class="inputArea">
<input id="msg" placeholder="اكتب رسالة...">
<button onclick="send()" class="send">✈️</button>
</div>

<!-- settings -->
<div id="settings" class="modal">
  <div class="modalBox">
    <h3>⚙️ Settings</h3>

    <select onchange="changeLang(this.value)">
      <option value="ar">العربية</option>
      <option value="en">English</option>
    </select>

    <button onclick="toggleMode()">🌙 / ☀️ وضع ليلي</button>

    <!-- الخلفيات -->
    <select onchange="changeBg(this.value)">
      <option value="">🎨 اختر الخلفية</option>
      <option value="bg-white">ابيض</option>
      <option value="bg-dark">اسود</option>
      <option value="bg-gray">رصاصي</option>
      <option value="bg-gold">ذهبي</option>
    </select>

    <button onclick="closeSettings()">إغلاق</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// Firebase
const firebaseConfig={
apiKey:"AIzaSyA3o3CHKaORvCNlNpUCIU2MmaeVM6w_coo",
authDomain:"chatx-781cf.firebaseapp.com",
projectId:"chatx-781cf"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// user
let user=localStorage.getItem("user");
if(!user){
user="User_"+Math.floor(Math.random()*9999);
localStorage.setItem("user",user);
}

// settings
function openSettings(){ settings.style.display="flex"; }
function closeSettings(){ settings.style.display="none"; }

// language
function changeLang(lang){
localStorage.setItem("lang",lang);

if(lang==="ar"){
document.documentElement.dir="rtl";
msg.placeholder="اكتب رسالة...";
}else{
document.documentElement.dir="ltr";
msg.placeholder="Type message...";
}
}
changeLang(localStorage.getItem("lang")||"ar");

// dark mode
function toggleMode(){
document.body.classList.toggle("dark");
}

// 🎨 background
function changeBg(bg){
document.body.classList.remove("bg-white","bg-dark","bg-gray","bg-gold");
if(bg){
document.body.classList.add(bg);
localStorage.setItem("bg",bg);
}
}

// load bg
let savedBg=localStorage.getItem("bg");
if(savedBg) document.body.classList.add(savedBg);

// 📤 send
function send(){
let text=msg.value;
if(!text.trim()) return;

db.collection("messages").add({
text:text,
user:user,
time:Date.now()
});

msg.value="";
}

// 📥 receive + day system
db.collection("messages")
.orderBy("time")
.onSnapshot(snap=>{
chat.innerHTML="";

let lastDay="";

snap.forEach(doc=>{
let d=doc.data();
let date=new Date(d.time);

let dayLabel="";
let today=new Date();

if(date.toDateString()===today.toDateString()){
dayLabel="Today";
}else if(date.toDateString()===new Date(today-86400000).toDateString()){
dayLabel="Yesterday";
}else{
dayLabel=date.toLocaleDateString();
}

if(dayLabel!==lastDay){
chat.innerHTML+=`<div class="day">${dayLabel}</div>`;
lastDay=dayLabel;
}

let div=document.createElement("div");
div.className="msg "+(d.user===user?"me":"other");

let time=date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

div.innerHTML=`
<div>${d.text}</div>
<div class="time">${time}</div>
`;

chat.appendChild(div);
});

chat.scrollTop=chat.scrollHeight;
});

// PWA
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
