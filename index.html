<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatX</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#075E54">

<style>
body{margin:0;font-family:system-ui;background:#0b141a;color:white;}

.header{
  background:#075E54;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

.status{
  font-size:12px;
  color:#25D366;
}

#chatBox{
  height:70vh;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg{
  max-width:70%;
  padding:10px;
  margin:5px;
  border-radius:12px;
}

.me{
  background:#005c4b;
  align-self:flex-end;
}

.other{
  background:#202c33;
  align-self:flex-start;
}

.meta{
  font-size:10px;
  opacity:0.6;
}

.inputArea{
  display:flex;
  padding:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button{
  width:45px;
  border:none;
  border-radius:50%;
  background:transparent;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <img id="myAvatar" class="avatar">
  <div>
    <div id="myName"></div>
    <div class="status" id="statusText">Online</div>
  </div>
</div>

<div id="chatBox"></div>

<div class="inputArea">
  <input id="msgInput" placeholder="اكتب رسالة...">
  <button onclick="sendMsg()">✕</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyA3o3CHKaORvCNlNpUCIU2MmaeVM6w_coo",
  authDomain:"chatx-781cf.firebaseapp.com",
  projectId:"chatx-781cf",
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// 👤 user setup
let userData = JSON.parse(localStorage.getItem("userData"));

if(!userData){
  let name = prompt("اسمك:");
  let avatar = prompt("رابط صورة بروفايل (اختياري):");

  userData = {
    name:name,
    avatar: avatar || "https://i.imgur.com/6VBx3io.png"
  };

  localStorage.setItem("userData", JSON.stringify(userData));
}

myName.innerText = userData.name;
myAvatar.src = userData.avatar;

// 🔵 online status
function setOnline(){
  db.collection("users").doc(userData.name).set({
    online:true,
    lastSeen:Date.now()
  });
}

function setOffline(){
  db.collection("users").doc(userData.name).update({
    online:false,
    lastSeen:Date.now()
  });
}

window.addEventListener("focus", setOnline);
window.addEventListener("blur", setOffline);

// 🔔 notifications
if("Notification" in window){
  Notification.requestPermission();
}

// 📤 send
function sendMsg(){
  if(!msgInput.value.trim()) return;

  db.collection("messages").add({
    text:msgInput.value,
    user:userData.name,
    avatar:userData.avatar,
    time:Date.now()
  });

  msgInput.value="";
}

// 📥 load
db.collection("messages").orderBy("time")
.onSnapshot(snap=>{

  chatBox.innerHTML="";

  snap.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <img src="${d.avatar}" style="width:25px;height:25px;border-radius:50%">
      <div>${d.text}</div>
      <div class="meta">${new Date(d.time).toLocaleTimeString()}</div>
    `;

    div.classList.add(d.user===userData.name?"me":"other");
    chatBox.appendChild(div);

  });

  chatBox.scrollTop = chatBox.scrollHeight;
});

// 🔔 notify
let lastTime=0;

db.collection("messages")
.orderBy("time","desc")
.limit(1)
.onSnapshot(snap=>{
  snap.forEach(doc=>{
    let d=doc.data();

    if(d.user!==userData.name && d.time>lastTime){
      lastTime=d.time;

      if(Notification.permission==="granted"){
        new Notification(d.user,{
          body:d.text
        });
      }
    }
  });
});

// PWA
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
