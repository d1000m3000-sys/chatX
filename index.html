<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatX</title>

<link rel="manifest" href="manifest.json">

<style>
body{margin:0;font-family:system-ui;background:#0b141a;color:white;}

.header{
  background:#075E54;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;
}

#chatBox{
  height:70vh;
  overflow:auto;
  padding:10px;
}

.msg{
  background:#202c33;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.me{background:#005c4b;}

#settings{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000dd;
  padding:20px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <img id="avatar" class="avatar">
  <div id="name"></div>
</div>

<div id="chatBox"></div>

<input id="msgInput" placeholder="اكتب رسالة">
<button onclick="sendMsg()">✕</button>

<!-- الإعدادات -->
<div id="settings">
  <h3>الإعدادات</h3>
  <input id="newName" placeholder="الاسم">
  <input id="newAvatar" placeholder="رابط الصورة">
  <textarea id="bio" placeholder="الوصف"></textarea>
  <button onclick="saveProfile()">حفظ</button>
  <button onclick="closeSettings()">إغلاق</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyA3o3CHKaORvCNlNpUCIU2MmaeVM6w_coo",
  authDomain:"chatx-781cf.firebaseapp.com",
  projectId:"chatx-781cf",
  messagingSenderId:"339379296949",
  appId:"1:339379296949:web:e793f99a0b9b1f16553cfc"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const messaging=firebase.messaging();

// 🔔 طلب الإذن
Notification.requestPermission();

// 🔑 ربط VAPID KEY
messaging.getToken({
  vapidKey: "BAOv4k0lGNLQm5T6AZbjzjQdUVjhb4og0XcT71PJF-ocOiwYZiMaEkRSI0zCQk0EIFWHCH58BEMS6RXqb7jq8Cc"
}).then((token)=>{
  console.log("TOKEN:",token);
});

// 👤 المستخدم
let user=JSON.parse(localStorage.getItem("user"));

if(!user){
  user={
    name:prompt("اسمك"),
    avatar:"",
    bio:""
  };
  localStorage.setItem("user",JSON.stringify(user));
}

name.innerText=user.name;
avatar.src=user.avatar||"https://i.imgur.com/6VBx3io.png";

// فتح الإعدادات
avatar.onclick=()=> settings.style.display="block";

function closeSettings(){
  settings.style.display="none";
}

// حفظ
function saveProfile(){
  user.name=newName.value||user.name;
  user.avatar=newAvatar.value||user.avatar;
  user.bio=bio.value;

  localStorage.setItem("user",JSON.stringify(user));
  location.reload();
}

// إرسال
function sendMsg(){
  if(!msgInput.value.trim()) return;

  db.collection("messages").add({
    text:msgInput.value,
    user:user.name,
    avatar:user.avatar,
    time:Date.now()
  });

  msgInput.value="";
}

// استقبال
db.collection("messages").orderBy("time")
.onSnapshot(snap=>{
  chatBox.innerHTML="";
  snap.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <b>${d.user}</b><br>
      ${d.text}<br>
      <small>${new Date(d.time).toLocaleTimeString()}</small>
    `;

    if(d.user===user.name) div.classList.add("me");

    chatBox.appendChild(div);
  });
});

// 🔔 إشعار داخل التطبيق
messaging.onMessage(payload=>{
  alert(payload.notification.title + "\\n" + payload.notification.body);
});

// تسجيل Service Worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
