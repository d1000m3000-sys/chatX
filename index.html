<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatX</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#075e54">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg-primary:#ece5dd;
--bg-header:#075e54;
--chat-user:#dcf8c5;
--chat-bot:#fff;
--text:#111;
}

body.dark{
--bg-primary:#0a1014;
--bg-header:#202c33;
--chat-user:#005c4b;
--chat-bot:#202c33;
--text:#fff;
}

body{
font-family:system-ui;
background:var(--bg-primary);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:var(--bg-header);
color:#fff;
padding:12px;
display:flex;
justify-content:space-between;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px;
border-radius:12px;
}

.me{align-self:flex-end;background:var(--chat-user);}
.other{align-self:flex-start;background:var(--chat-bot);}

.time{font-size:10px;opacity:.6;}

.inputArea{
display:flex;
padding:10px;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.send{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:#25D366;
color:#fff;
font-size:18px;
}
</style>
</head>

<body>

<div class="header">
💬 ChatX
<button onclick="toggleMode()">🌓</button>
</div>

<div id="chat" class="messages"></div>

<div class="inputArea">
<input id="msg" placeholder="اكتب رسالة...">
<button onclick="send()" class="send">✈️</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// Firebase
const firebaseConfig={
apiKey:"AIzaSyA3o3CHKaORvCNlNpUCIU2MmaeVM6w_coo",
authDomain:"chatx-781cf.firebaseapp.com",
projectId:"chatx-781cf"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// user
let user=localStorage.getItem("user");
if(!user){
user="User_"+Math.floor(Math.random()*9999);
localStorage.setItem("user",user);
}

// dark mode
function toggleMode(){
document.body.classList.toggle("dark");
}

// send
function send(){
let text=msg.value;
if(!text.trim()) return;

db.collection("messages").add({
text:text,
user:user,
time:Date.now()
});

msg.value="";
}

// receive
db.collection("messages")
.orderBy("time")
.onSnapshot(snap=>{
chat.innerHTML="";

snap.forEach(doc=>{
let d=doc.data();

let div=document.createElement("div");
div.className="msg "+(d.user===user?"me":"other");

div.innerHTML=`
<div>${d.text}</div>
<div class="time">${new Date(d.time).toLocaleTimeString()}</div>
`;

chat.appendChild(div);
});

chat.scrollTop=chat.scrollHeight;
});

// 🔥 تسجيل Service Worker
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
