<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatX</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#075e54">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg-primary:#ece5dd;
--bg-header:#075e54;
--chat-user:#dcf8c5;
--chat-bot:#fff;
--text:#111;
}

/* 🔥 خلفيات متدرجة احترافية */
.bg1{background:linear-gradient(135deg,#667eea,#764ba2);}
.bg2{background:linear-gradient(135deg,#ff9a9e,#fad0c4);}
.bg3{background:linear-gradient(135deg,#a18cd1,#fbc2eb);}
.bg4{background:linear-gradient(135deg,#f6d365,#fda085);}
.bg5{background:linear-gradient(135deg,#84fab0,#8fd3f4);}
.bg6{background:linear-gradient(135deg,#43e97b,#38f9d7);}
.bg7{background:linear-gradient(135deg,#fa709a,#fee140);}
.bg8{background:linear-gradient(135deg,#30cfd0,#330867);}
.bg9{background:linear-gradient(135deg,#5f2c82,#49a09d);}
.bg10{background:linear-gradient(135deg,#ff758c,#ff7eb3);}

/* الوضع الليلي */
body.dark{
--bg-header:#202c33;
--chat-user:#005c4b;
--chat-bot:#202c33;
--text:#fff;
}

body{
font-family:system-ui;
background:var(--bg-primary);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
}

/* 🔥 Blur Header */
.header{
background:rgba(0,0,0,0.4);
backdrop-filter: blur(10px);
color:#fff;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* 🔥 Blur messages area */
.messages{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
backdrop-filter: blur(6px);
}

/* 🔥 Glass effect messages */
.msg{
max-width:75%;
padding:10px;
border-radius:12px;
backdrop-filter: blur(10px);
background:rgba(255,255,255,0.2);
}

.me{align-self:flex-end;background:rgba(220,248,197,0.6);}
.other{align-self:flex-start;background:rgba(255,255,255,0.4);}

.time{
font-size:10px;
opacity:.7;
margin-top:5px;
}

/* day label */
.day{
text-align:center;
font-size:12px;
opacity:.8;
margin:10px 0;
}

/* input */
.inputArea{
display:flex;
padding:10px;
gap:5px;
background:rgba(0,0,0,0.3);
backdrop-filter: blur(10px);
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
outline:none;
background:rgba(255,255,255,0.3);
color:white;
}

/* زر الطيارة */
.send{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:#25D366;
color:#fff;
font-size:18px;
}

/* settings */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000000aa;
display:none;
justify-content:center;
align-items:center;
}

.modalBox{
background:white;
padding:20px;
border-radius:15px;
width:80%;
max-width:300px;
}

.modalBox button,select{
width:100%;
margin-top:10px;
padding:10px;
}
</style>
</head>

<body>

<div class="header">
💬 ChatX
<button onclick="openSettings()">⚙️</button>
</div>

<div id="chat" class="messages"></div>

<div class="inputArea">
<input id="msg" placeholder="اكتب رسالة...">
<button onclick="send()" class="send">✈️</button>
</div>

<!-- settings -->
<div id="settings" class="modal">
  <div class="modalBox">
    <h3>⚙️ Settings</h3>

    <select onchange="changeLang(this.value)">
      <option value="ar">العربية</option>
      <option value="en">English</option>
    </select>

    <button onclick="toggleMode()">🌙 / ☀️ وضع ليلي</button>

    <!-- الخلفيات -->
    <select onchange="changeBg(this.value)">
      <option value="">🎨 اختر الخلفية</option>
      <option value="bg1">متدرج 1</option>
      <option value="bg2">متدرج 2</option>
      <option value="bg3">متدرج 3</option>
      <option value="bg4">متدرج 4</option>
      <option value="bg5">متدرج 5</option>
      <option value="bg6">متدرج 6</option>
      <option value="bg7">متدرج 7</option>
      <option value="bg8">متدرج 8</option>
      <option value="bg9">متدرج 9</option>
      <option value="bg10">متدرج 10</option>
    </select>

    <button onclick="closeSettings()">إغلاق</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// Firebase
const firebaseConfig={
apiKey:"AIzaSyA3o3CHKaORvCNlNpUCIU2MmaeVM6w_coo",
authDomain:"chatx-781cf.firebaseapp.com",
projectId:"chatx-781cf"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// user
let user=localStorage.getItem("user");
if(!user){
user="User_"+Math.floor(Math.random()*9999);
localStorage.setItem("user",user);
}

// settings
function openSettings(){ settings.style.display="flex"; }
function closeSettings(){ settings.style.display="none"; }

// language
function changeLang(lang){
localStorage.setItem("lang",lang);
document.documentElement.dir = lang==="ar" ? "rtl" : "ltr";
msg.placeholder = lang==="ar" ? "اكتب رسالة..." : "Type message...";
}
changeLang(localStorage.getItem("lang")||"ar");

// dark mode
function toggleMode(){
document.body.classList.toggle("dark");
}

// الخلفية
function changeBg(bg){
document.body.className = document.body.className.replace(/bg\d+/g,'');
if(bg){
document.body.classList.add(bg);
localStorage.setItem("bg",bg);
}
}
let savedBg=localStorage.getItem("bg");
if(savedBg) document.body.classList.add(savedBg);

// send
function send(){
let text=msg.value;
if(!text.trim()) return;

db.collection("messages").add({
text:text,
user:user,
time:Date.now()
});

msg.value="";
}

// receive
db.collection("messages")
.orderBy("time")
.onSnapshot(snap=>{
chat.innerHTML="";
let lastDay="";

snap.forEach(doc=>{
let d=doc.data();
let date=new Date(d.time);

let today=new Date();
let label="";

if(date.toDateString()===today.toDateString()){
label="Today";
}else if(date.toDateString()===new Date(today-86400000).toDateString()){
label="Yesterday";
}else{
label=date.toLocaleDateString();
}

if(label!==lastDay){
chat.innerHTML+=`<div class="day">${label}</div>`;
lastDay=label;
}

let div=document.createElement("div");
div.className="msg "+(d.user===user?"me":"other");

div.innerHTML=`
<div>${d.text}</div>
<div class="time">${date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
`;

chat.appendChild(div);
});

chat.scrollTop=chat.scrollHeight;
});

// 🔥 تحديث تلقائي PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then(reg => {

    setInterval(()=>{ reg.update(); },30000);

    reg.onupdatefound=()=>{
      let newWorker=reg.installing;
      newWorker.onstatechange=()=>{
        if(newWorker.state==="installed" && navigator.serviceWorker.controller){
          window.location.reload();
        }
      };
    };

  });
}

</script>

</body>
</html>
