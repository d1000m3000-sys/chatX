<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatX</title>

<link rel="manifest" href="manifest.json">

<style>
:root{
  --bg:#0b141a;
  --card:#202c33;
  --me:#005c4b;
  --text:white;
}

.light{
  --bg:#f0f2f5;
  --card:#e4e6eb;
  --me:#25D366;
  --text:black;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.header{
  background:#075E54;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;
}

#chatBox{
  height:70vh;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  background:#121b22;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:12px;
}

.me{background:var(--me);align-self:flex-end;}
.other{background:var(--card);align-self:flex-start;}

.meta{font-size:10px;opacity:0.6;}

.inputArea{
  display:flex;
  padding:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

.sendBtn{
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#25D366;
  color:white;
  font-size:18px;
}

.controls{
  display:flex;
  gap:5px;
}

#settings{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000dd;
  padding:20px;
}

textarea{
  width:100%;
}
</style>
</head>

<body>

<div class="header">
  <div class="profile">
    <img id="avatar" class="avatar">
    <div id="name"></div>
  </div>

  <div class="controls">
    <button onclick="toggleMode()">🌓</button>
    <select onchange="changeLang(this.value)">
      <option value="ar">AR</option>
      <option value="en">EN</option>
      <option value="es">ES</option>
    </select>
  </div>
</div>

<div id="chatBox"></div>

<div class="inputArea">
  <input id="msgInput">
  <button onclick="sendMsg()" class="sendBtn">✈️</button>
</div>

<!-- settings -->
<div id="settings">
  <h3>الإعدادات</h3>
  <input id="newName" placeholder="اسمك">
  <input id="newAvatar" placeholder="رابط الصورة">
  <textarea id="bio" placeholder="الوصف"></textarea>
  <button onclick="saveProfile()">حفظ</button>
  <button onclick="settings.style.display='none'">إغلاق</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyA3o3CHKaORvCNlNpUCIU2MmaeVM6w_coo",
  authDomain:"chatx-781cf.firebaseapp.com",
  projectId:"chatx-781cf",
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// user
let user=JSON.parse(localStorage.getItem("user"));

if(!user){
  user={name:prompt("اسمك"),avatar:"",bio:""};
  localStorage.setItem("user",JSON.stringify(user));
}

name.innerText=user.name;
avatar.src=user.avatar||"https://i.imgur.com/6VBx3io.png";

// settings
avatar.onclick=()=>settings.style.display="block";

function saveProfile(){
  user.name=newName.value||user.name;
  user.avatar=newAvatar.value||user.avatar;
  user.bio=bio.value;
  localStorage.setItem("user",JSON.stringify(user));
  location.reload();
}

// language
const lang={
  ar:"اكتب رسالة...",
  en:"Type message...",
  es:"Escribe..."
};

function changeLang(l){
  localStorage.setItem("lang",l);
  msgInput.placeholder=lang[l];
}

msgInput.placeholder=lang[localStorage.getItem("lang")||"ar"];

// dark mode
function toggleMode(){
  document.body.classList.toggle("light");
}

// send
function sendMsg(){
  if(!msgInput.value.trim()) return;

  db.collection("messages").add({
    text:msgInput.value,
    user:user.name,
    avatar:user.avatar,
    time:Date.now()
  });

  msgInput.value="";
}

// load
db.collection("messages").orderBy("time")
.onSnapshot(snap=>{
  chatBox.innerHTML="";
  snap.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <div>${d.text}</div>
      <div class="meta">${d.user} - ${new Date(d.time).toLocaleTimeString()}</div>
    `;

    div.classList.add(d.user===user.name?"me":"other");
    chatBox.appendChild(div);
  });

  chatBox.scrollTop=chatBox.scrollHeight;
});

// notifications
if("Notification" in window){
  Notification.requestPermission();
}

let last=0;

db.collection("messages")
.orderBy("time","desc")
.limit(1)
.onSnapshot(snap=>{
  snap.forEach(doc=>{
    let d=doc.data();
    if(d.user!==user.name && d.time>last){
      last=d.time;

      if(Notification.permission==="granted"){
        new Notification("ChatX",{
          body:d.user+": "+d.text
        });
      }
    }
  });
});

// PWA
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
