<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatX</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#075E54">

<style>
:root{
  --bg:#0b141a;
  --card:#202c33;
  --me:#005c4b;
  --text:white;
}

/* Light mode */
.light{
  --bg:#f0f2f5;
  --card:#e4e6eb;
  --me:#25D366;
  --text:black;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.header{
  background:#075E54;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#chatBox{
  height:75vh;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  background:#121b22; /* ثابت مريح */
}

.msg{
  max-width:75%;
  padding:10px;
  margin:6px;
  border-radius:12px;
}

.me{
  background:var(--me);
  align-self:flex-end;
}

.other{
  background:var(--card);
  align-self:flex-start;
}

.meta{
  font-size:11px;
  opacity:0.6;
  margin-top:5px;
  display:flex;
  justify-content:space-between;
}

.inputArea{
  display:flex;
  padding:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
}

.sendBtn{
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  background:transparent;
  color:white;
  font-size:20px;
}

/* top controls */
.controls{
  display:flex;
  gap:5px;
}

select,button.top{
  border:none;
  padding:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="header">
  <div>💬 ChatX</div>

  <div class="controls">
    <button class="top" onclick="toggleMode()">🌓</button>

    <select onchange="changeLang(this.value)">
      <option value="ar">AR</option>
      <option value="en">EN</option>
      <option value="es">ES</option>
    </select>
  </div>
</div>

<div id="chatBox"></div>

<div class="inputArea">
  <input id="msgInput" placeholder="اكتب رسالة...">
  <button onclick="sendMsg()" class="sendBtn">✕</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
  apiKey:"AIzaSyA3o3CHKaORvCNlNpUCIU2MmaeVM6w_coo",
  authDomain:"chatx-781cf.firebaseapp.com",
  projectId:"chatx-781cf",
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// user
let user=localStorage.getItem("user");
if(!user){
  user=prompt("اسمك:");
  localStorage.setItem("user",user);
}

// notifications
if("Notification" in window){
  Notification.requestPermission();
}

// language
const langData={
  ar:{placeholder:"اكتب رسالة..."},
  en:{placeholder:"Type a message..."},
  es:{placeholder:"Escribe un mensaje..."}
};

function changeLang(lang){
  localStorage.setItem("lang",lang);
  applyLang();
}

function applyLang(){
  let lang=localStorage.getItem("lang")||"ar";
  msgInput.placeholder=langData[lang].placeholder;
}
applyLang();

// dark/light
function toggleMode(){
  document.body.classList.toggle("light");
}

// send
function sendMsg(){
  if(!msgInput.value.trim()) return;

  db.collection("messages").add({
    text:msgInput.value,
    user:user,
    time:Date.now()
  });

  msgInput.value="";
}

// load
db.collection("messages").orderBy("time")
.onSnapshot(snap=>{

  chatBox.innerHTML="";

  snap.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <div>${d.text}</div>
      <div class="meta">
        <span>${d.user}</span>
        <span>${new Date(d.time).toLocaleTimeString()}</span>
      </div>
    `;

    div.classList.add(d.user===user?"me":"other");
    chatBox.appendChild(div);

  });

  chatBox.scrollTop = chatBox.scrollHeight;
});

// notifications (منفصلة)
let lastTime=0;

db.collection("messages")
.orderBy("time","desc")
.limit(1)
.onSnapshot(snap=>{
  snap.forEach(doc=>{
    let d=doc.data();

    if(d.user!==user && d.time>lastTime){
      lastTime=d.time;

      if(Notification.permission==="granted"){
        new Notification("ChatX",{
          body:d.user+": "+d.text
        });
      }
    }
  });
});

// PWA
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
